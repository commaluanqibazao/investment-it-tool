<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投资项目IT职能助手</title>
<style>
  /* ========== Reset & Base ========== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f5f5; color: #1f1f1f; }

  /* ========== Layout ========== */
  .app { display: flex; height: 100vh; width: 100%; }

  /* ========== Left Panel (Chat) ========== */
  .chat-panel {
    width: 42%; min-width: 420px;
    display: flex; flex-direction: column;
    background: #ffffff; border-right: 1px solid #e5e5e5;
    position: relative;
  }

  /* Header */
  .chat-header {
    padding: 20px 24px 12px;
    border-bottom: 1px solid #f0f0f0;
    flex-shrink: 0;
  }
  .chat-header h1 {
    font-size: 18px; font-weight: 600; color: #1f1f1f;
    display: flex; align-items: center; gap: 8px;
  }
  .chat-header h1 svg { width: 22px; height: 22px; }
  .chat-header .subtitle {
    font-size: 13px; color: #666; line-height: 1.6; margin-top: 6px;
    padding-left: 30px;
  }

  /* Messages */
  .messages {
    flex: 1; overflow-y: auto; padding: 16px 24px 8px;
    display: flex; flex-direction: column; gap: 12px;
    scroll-behavior: smooth;
  }
  .messages .empty-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: #bbb; font-size: 14px; gap: 8px;
  }
  .messages .empty-state svg { width: 48px; height: 48px; opacity: 0.4; }
  .messages .empty-state p { max-width: 280px; text-align: center; line-height: 1.6; }

  .msg { display: flex; gap: 10px; max-width: 100%; }
  .msg.user { flex-direction: row-reverse; }
  .msg .avatar {
    width: 30px; height: 30px; border-radius: 50%;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600; margin-top: 2px;
  }
  .msg.assistant .avatar { background: #e8f4ff; color: #1a8cff; }
  .msg.user .avatar { background: #e8f4ff; color: #1a8cff; }
  .msg .bubble {
    max-width: 85%; padding: 10px 14px;
    border-radius: 12px; font-size: 14px; line-height: 1.6;
    word-break: break-word; white-space: pre-wrap;
  }
  .msg.assistant .bubble {
    background: #f7f7f8; color: #1f1f1f;
    border-bottom-left-radius: 4px;
  }
  .msg.user .bubble {
    background: #1a8cff; color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg .bubble .typing-dots { display: flex; gap: 4px; padding: 4px 0; }
  .msg .bubble .typing-dots span {
    width: 6px; height: 6px; border-radius: 50%; background: #999;
    animation: dotPulse 1.4s infinite ease-in-out;
  }
  .msg .bubble .typing-dots span:nth-child(1) { animation-delay: 0s; }
  .msg .bubble .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .msg .bubble .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotPulse { 0%,80%,100% { opacity: 0.3; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1); } }

  /* Rejection message style */
  .msg .bubble.rejection { background: #fff3e0; color: #e65100; }

  /* Input Area */
  .input-area {
    padding: 12px 20px 20px;
    border-top: 1px solid #f0f0f0; flex-shrink: 0;
  }
  .input-wrapper {
    display: flex; align-items: flex-end; gap: 8px;
    background: #f7f7f8; border: 1px solid #e5e5e5;
    border-radius: 12px; padding: 8px 8px 8px 16px;
    transition: border-color 0.2s;
  }
  .input-wrapper:focus-within { border-color: #1a8cff; }
  .input-wrapper textarea {
    flex: 1; border: none; background: transparent;
    resize: none; font-size: 14px; line-height: 1.5;
    font-family: inherit; color: #1f1f1f;
    outline: none; max-height: 120px;
    padding: 4px 0;
  }
  .input-wrapper textarea::placeholder { color: #bbb; }
  .input-wrapper button {
    width: 36px; height: 36px; border-radius: 8px;
    border: none; background: #1a8cff; color: #fff;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.2s; flex-shrink: 0;
  }
  .input-wrapper button:hover { background: #0a6fd6; }
  .input-wrapper button:disabled { background: #ccc; cursor: not-allowed; }
  .input-wrapper button svg { width: 18px; height: 18px; }

  /* ========== Right Panel (Document Preview) ========== */
  .doc-panel {
    flex: 1; display: flex; flex-direction: column;
    background: #fafafa;
  }
  .doc-header {
    padding: 20px 28px 14px;
    border-bottom: 1px solid #e5e5e5; flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
  }
  .doc-header .doc-title {
    font-size: 14px; font-weight: 500; color: #444;
    display: flex; align-items: center; gap: 8px;
  }
  .doc-header .doc-title svg { width: 18px; height: 18px; opacity: 0.6; }
  .doc-actions { display: flex; gap: 8px; }
  .doc-actions button {
    padding: 6px 14px; border-radius: 6px; border: 1px solid #ddd;
    background: #fff; font-size: 12px; cursor: pointer;
    display: flex; align-items: center; gap: 5px;
    transition: all 0.15s; color: #444;
  }
  .doc-actions button:hover { border-color: #1a8cff; color: #1a8cff; background: #f0f7ff; }
  .doc-actions button:disabled { opacity: 0.4; cursor: not-allowed; }

  .doc-content {
    flex: 1; overflow-y: auto; padding: 32px 40px;
  }
  .doc-content .empty-state {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%; color: #bbb; gap: 12px;
  }
  .doc-content .empty-state svg { width: 56px; height: 56px; opacity: 0.3; }
  .doc-content .empty-state p { font-size: 14px; max-width: 300px; text-align: center; line-height: 1.8; }

  /* Rendered Markdown */
  .doc-render { max-width: 800px; margin: 0 auto; }
  .doc-render h1 { font-size: 22px; font-weight: 600; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid #1a8cff; color: #1f1f1f; }
  .doc-render h2 { font-size: 17px; font-weight: 600; margin: 20px 0 10px; color: #2c3e50; }
  .doc-render h3 { font-size: 15px; font-weight: 600; margin: 16px 0 8px; color: #34495e; }
  .doc-render p { margin-bottom: 10px; line-height: 1.7; color: #333; }
  .doc-render table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 13px; }
  .doc-render th, .doc-render td { border: 1px solid #ddd; padding: 8px 12px; text-align: left; }
  .doc-render th { background: #f5f8ff; font-weight: 600; }
  .doc-render tr:nth-child(even) { background: #fafafa; }
  .doc-render strong { font-weight: 600; color: #1f1f1f; }
  .doc-render ul, .doc-render ol { margin: 8px 0 8px 20px; line-height: 1.7; }
  .doc-render code { background: #f0f0f0; padding: 2px 6px; border-radius: 3px; font-size: 13px; }
  .doc-render pre { background: #f5f5f5; padding: 12px 16px; border-radius: 8px; overflow-x: auto; margin: 12px 0; }

  /* ========== Responsive ========== */
  @media (max-width: 860px) {
    .app { flex-direction: column; }
    .chat-panel { width: 100%; min-width: unset; max-height: 50vh; border-right: none; border-bottom: 1px solid #e5e5e5; }
    .doc-panel { flex: 1; }
    .doc-content { padding: 20px; }
  }

  /* ========== Scrollbar ========== */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #bbb; }
</style>
</head>

<div class="app">

  <!-- ===== Left: Chat Panel ===== -->
  <div class="chat-panel">
    <div class="chat-header">
      <h1>
        <svg viewBox="0 0 24 24" fill="none" stroke="#1a8cff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

<script>
// ============================================================
//  Agent Integration — 投资项目IT职能 Agent 调度
// ============================================================

/**
 * 检测用户输入是否属于"投资项目IT职能"相关领域
 */
function isItInvestmentWork(text) {
  const keywords = [
    'it', '信息技术', '技术', '系统', '软件', '硬件', '网络', '安全',
    '尽调', '尽职调查', 'itdd', '风险', '筛查', '合规', '法规',
    '国别', '行业', '技术栈', '架构', '评估', '审核', '审计',
    '数据中心', '云', 'saas', 'paas', '数据保护', '隐私',
    '网络安全', '等保', 'iso', '认证', '灾备', '业务连续性',
    '供应商', 'erp', 'crm', 'plm', 'mes', 'scada', 'iot',
    'it投资', 'it项目', '信息化', '数字化', '数字化转型',
    '技术尽职调查', 'it审计', '信息安全', '渗透测试', '漏洞',
    '源代码', '知识产权', '许可证', '开源', 'license',
    '投前', '投后', '并购', '收购', '投资', '交易',
    '法规', '监管', '披露', '上市公司', '上市地',
    '风险分析', '风险筛查', '合规风险', '检查清单',
  ];
  const lower = text.toLowerCase();
  for (const kw of keywords) {
    if (lower.includes(kw)) return true;
  }
  return false;
}

// ============================================================
//  Agent 模拟输出（可替换为真实 API 调用）
// ============================================================

/**
 * 根据用户输入生成文档内容。
 * 实际使用时，可替换为调用 risk-analyst agent 或其他 agent。
 */
async function callAgent(userInputText) {
  // --- 模拟延时（真实场景替换为 API 调用）---
  await sleep(1800);

  // --- 示例：国别风险筛查 ---
  if (/国别|行业.*风险|风险筛查|itdd.*筛查/.test(userInputText)) {
    return generateSampleRiskReport(userInputText);
  }

  // --- 示例：IT尽职调查 ---
  if (/尽调|尽职调查|itdd/.test(userInputText)) {
    return generateSampleItddReport(userInputText);
  }

  // --- 默认：通用 IT 评估 ---
  return generateSampleAssessmentReport(userInputText);
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ============================================================
//  示例报告生成函数
// ============================================================

function extractEntities(text) {
  // 简单从输入中提取可能的公司/国家/行业信息
  const lines = text.split(/[\n,，。、]/).map(s => s.trim()).filter(Boolean);
  return {
    company: lines.find(l => /公司|inc|corp|ltd|limited/.test(l.toLowerCase())) || '目标公司',
    country: lines.find(l => /国|美国|中国|印度|日本|德国|英国|新加坡/.test(l)) || '目标国家',
    industry: lines.find(l => /行业|业|金融|制造|能源|医疗|教育|零售/.test(l)) || '目标行业',
  };
}

function generateSampleRiskReport(input) {
  const e = extractEntities(input);
  const report = `# 投前国别行业 IT 风险筛查报告

## 一、标的基本信息

| 字段 | 内容 |
|------|------|
| 目标公司 | ${e.company} |
| 所在国家 | ${e.country} |
| 所属行业 | ${e.industry} |
| 典型技术栈 | 待确认 |
| 是否上市公司 | 待确认 |
| 交易背景 | 待确认 |

## 二、适用法规速览

| 法规名称 | 适用范围 | 关键要求 | 违规后果 | 来源 |
|----------|----------|----------|----------|------|
| 数据保护法 (DPA) | 全行业 | 个人数据跨境传输需评估 | 最高全球营收 4% 罚款 | 官方公报 2023 |
| 网络安全法 | 关键信息基础设施 | 数据本地化存储、安全评估 | 50万-500万罚款 | 政府官网 2022 |
| 电子交易法 | 全行业 | 电子签名认证要求 | 合同无效风险 | 政府官网 2021 |
| 上市地披露要求 | 上市公司 | IT 安全风险必须披露 | 退市/处罚 | 交易所指引 2024 |

## 三、中高风险事项及检查建议

| 风险事项 | 等级 | 对应法规 | 风险描述 | 检查建议 |
|----------|------|----------|----------|----------|
| 数据跨境合规 | 🔴 高 | DPA 第X条 | 目标公司数据处理涉及跨境传输，需评估合规性 | 审查数据传输协议与用户同意机制 |
| 数据本地化 | 🟡 中 | 网络安全法 | 关键数据须在境内存储 | 确认 IT 架构中的数据存储位置 |
| 供应商依赖 | 🟡 中 | — | 核心技术栈依赖境外供应商 | 审计供应商合同中的SLA与数据条款 |

## 四、来源清单

### 政府/法规原文
1. 目标国数据保护法官方文本（2023）- 当地语言
2. 网络安全法实施细则（2022）
3. 电子交易法修订案（2021）

### 律所分析
4. Baker McKenzie - Data Protection Overview（2024）
5. DLA Piper - 全球数据保护指南（2023）

### 行业报告
6. Gartner - 目标国IT法规合规报告（2024）
7. IDC - 行业数字化成熟度评估（2023）

---

> ⚠️ **提示**：以上为投前快速筛查结果，建议由专业 ITDD 团队逐项深入验证。
`;
  return report;
}

function generateSampleItddReport(input) {
  const e = extractEntities(input);
  const report = `# IT 尽职调查报告大纲

## 一、交易概况
- **目标公司**: ${e.company}
- **所在地区**: ${e.country}
- **所属行业**: ${e.industry}

## 二、IT 架构评估

| 数据保护 | 隐私政策、用户同意机制 | 待核实 |
| 知识产权 | 源代码所有权、开源 License | 待核实 |
| 供应商 | 关键 IT 供应商合同与续约 | 待核实 |

## 四、IT 团队与组织
- 团队规模与结构
- IT 预算占营收比例

## 五、发现汇总
> 详细发现待现场尽调后补充。

---

*生成时间: ${new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' })}*
`;
  return report;
}

function generateSampleAssessmentReport(input) {
  const e = extractEntities(input);
  const report = `# 技术评估简报

## 评估对象
${e.company}（${e.country} · ${e.industry}）

## 一、技术栈概览

| 层级 | 技术选型 | 评估意见 |
|------|----------|----------|
| 前端 | — | 待确认 |
| 后端 | — | 待确认 |
| 数据库 | — | 待确认 |
| 基础设施 | — | 待确认 |
| 安全方案 | — | 待确认 |

## 二、关键评估维度

### 2.1 技术债务
- 遗留系统版本及维护状态

  return report;
}

// ============================================================
//  UI 交互逻辑
// ============================================================

const messagesEl = document.getElementById('messages');
const emptyState = document.getElementById('emptyState');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const docContent = document.getElementById('docContent');
const docEmpty = document.getElementById('docEmpty');
const downloadMdBtn = document.getElementById('downloadMdBtn');
const downloadDocBtn = document.getElementById('downloadDocBtn');

let currentDoc = '';  // 当前文档内容（原始 Markdown）

// Auto-resize textarea
userInput.addEventListener('input', () => {
  userInput.style.height = 'auto';
  userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
});

// Send on Enter (Shift+Enter for newline)
userInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

sendBtn.addEventListener('click', sendMessage);

async function sendMessage() {
  const text = userInput.value.trim();
  if (!text) return;

  // 清空输入
  userInput.value = '';
  userInput.style.height = 'auto';
  sendBtn.disabled = true;

  // 隐藏空状态
  emptyState.style.display = 'none';

  // 添加用户消息
  addMessage(text, 'user');

  // 检查是否为投资项目 IT 职能相关
  if (!isItInvestmentWork(text)) {
    addMessage('本页面仅支持投资项目 IT 职能相关工作。请描述您的 IT 尽调、技术评估、风险筛查等需求。', 'assistant', true);
    sendBtn.disabled = false;
    return;
  }

  // 显示输入中...
  const typingId = showTyping();

  try {
    // 调用 Agent 生成文档
    currentDoc = await callAgent(text);

    // 移除输入中，显示结果消息
    removeTyping(typingId);
    addMessage('✅ 文档已生成，请在右侧查看和下载。', 'assistant');

    // 在右侧渲染文档
    renderDocument(currentDoc);

  } catch (err) {
    removeTyping(typingId);
    addMessage('文档生成失败，请重试。错误: ' + err.message, 'assistant', true);
  } finally {
    sendBtn.disabled = false;
  }
}

function addMessage(text, role, isRejection = false) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'user' ? 'U' : 'AI';

  const bubble = document.createElement('div');
  bubble.className = 'bubble' + (isRejection ? ' rejection' : '');
  bubble.textContent = text;

  div.appendChild(avatar);
  div.appendChild(bubble);
  messagesEl.appendChild(div);
  scrollToBottom();
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.id = 'typing-' + Date.now();

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = 'AI';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';

  div.appendChild(avatar);
  div.appendChild(bubble);
  messagesEl.appendChild(div);
  scrollToBottom();
  return div.id;
}

function removeTyping(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

// ============================================================
//  文档渲染与下载
// ============================================================

function renderDocument(markdown) {
  // 隐藏空状态
  docEmpty.style.display = 'none';

  // 简单 Markdown 渲染（生产环境建议用 marked.js 等库）
  const html = simpleMarkdownToHtml(markdown);

  const renderDiv = document.createElement('div');
  renderDiv.className = 'doc-render';
  renderDiv.innerHTML = html;

  // 清除旧内容，追加新内容
  docContent.innerHTML = '';
  docContent.appendChild(renderDiv);

  // 启用下载按钮
  downloadMdBtn.disabled = false;
  downloadDocBtn.disabled = false;
}

function simpleMarkdownToHtml(md) {
  // 1) Escape HTML entities (but preserve existing tags we'll generate)
  let html = md
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');

  // 2) Block-level processing: split into lines first
  const lines = html.split('\n');
  const blocks = [];
  let i = 0;

  while (i < lines.length) {
    const line = lines[i];

    // --- Horizontal rule ---
    if (/^---/.test(line.trim())) {
      blocks.push('<hr>');
      i++;
      continue;
    }

    // --- Table ---
    if (line.startsWith('|')) {
      let tableRows = [];
      while (i < lines.length && lines[i].startsWith('|')) {
        const l = lines[i].trim();
        // skip separator row (|---|)
        if (l.includes('---')) { i++; continue; }
        const cells = l.split('|').filter(c => c.trim());
        const tag = tableRows.length === 0 ? 'th' : 'td';
        // First row becomes <th>
        const rowTag = tableRows.length === 0 ? 'th' : 'td';
        const row = '<tr>' + cells.map(c => `<${rowTag}>${c.trim()}</${rowTag}>`).join('') + '</tr>';
        tableRows.push(row);
        i++;
      }
      blocks.push('<table>' + tableRows.join('') + '</table>');
      continue;
    }

    // --- Blockquote ---
    if (/^> /.test(line)) {
      let bqLines = [];
      while (i < lines.length && /^> /.test(lines[i])) {
        bqLines.push(lines[i].replace(/^> /, ''));
        i++;
      }
      blocks.push('<blockquote>' + bqLines.join('<br>') + '</blockquote>');
      continue;
    }

    // --- Unordered list ---
    if (/^- /.test(line)) {
      let items = [];
      while (i < lines.length && /^- /.test(lines[i])) {
        items.push('<li>' + lines[i].replace(/^- /, '') + '</li>');
        i++;
      }
      blocks.push('<ul>' + items.join('') + '</ul>');
      continue;
    }

    // --- Ordered list ---
    if (/^\d+\. /.test(line)) {
      let items = [];
      while (i < lines.length && /^\d+\. /.test(lines[i])) {
        items.push('<li>' + lines[i].replace(/^\d+\. /, '') + '</li>');
        i++;
      }
      blocks.push('<ol>' + items.join('') + '</ol>');
      continue;
    }

    // --- Empty line (skip) ---
    if (line.trim() === '') {
      i++;
      continue;
    }

    // --- Headers ---
    if (/^### /.test(line)) { blocks.push('<h3>' + line.replace(/^### /, '') + '</h3>'); i++; continue; }
    if (/^## /.test(line)) { blocks.push('<h2>' + line.replace(/^## /, '') + '</h2>'); i++; continue; }
    if (/^# /.test(line)) { blocks.push('<h1>' + line.replace(/^# /, '') + '</h1>'); i++; continue; }

    // --- Paragraph ---
    let paraLines = [];
    while (i < lines.length && lines[i].trim() !== '' && !/^[#|>-]/.test(lines[i]) && !/^- /.test(lines[i]) && !/^\d+\. /.test(lines[i])) {
      paraLines.push(lines[i].trim());
      i++;
    }
    if (paraLines.length > 0) {
      blocks.push('<p>' + paraLines.join(' ') + '</p>');
    }
  }

  // 3) Inline formatting across all blocks
  let result = blocks.join('\n');
  result = result
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/(?<!<[^>]*)\*(.+?)\*(?![^<]*>)/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>');

  return result;
}

// Download as Markdown
downloadMdBtn.addEventListener('click', () => {
  if (!currentDoc) return;
  const blob = new Blob([currentDoc], { type: 'text/markdown;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `IT_Report_${new Date().toISOString().slice(0, 10)}.md`;
  a.click();
  URL.revokeObjectURL(url);
});

// Download as Word (.doc — HTML-based Word format)
downloadDocBtn.addEventListener('click', () => {
  if (!currentDoc) return;
  const htmlContent = `<!DOCTYPE html>
<html xmlns:o='urn:schemas-microsoft-com:office:office'
      xmlns:w='urn:schemas-microsoft-com:office:word'
      xmlns='http://www.w3.org/TR/REC-html40'>
<head><meta charset="utf-8"><title>IT Report</title>
<style>
body { font-family: "Noto Sans SC", "Microsoft YaHei", sans-serif; padding: 40px; line-height: 1.6; max-width: 800px; margin: 0 auto; }
h1 { font-size: 22px; border-bottom: 2px solid #1a8cff; padding-bottom: 8px; }
h2 { font-size: 17px; margin-top: 24px; }
h3 { font-size: 15px; margin-top: 18px; }
table { width: 100%; border-collapse: collapse; margin: 12px 0; }
th, td { border: 1px solid #aaa; padding: 6px 10px; }
th { background: #f0f4ff; }
code { background: #f0f0f0; padding: 1px 4px; }
pre { background: #f5f5f5; padding: 10px; }
</style></head>
<body>
${simpleMarkdownToHtml(currentDoc)}
</body></html>`;

  const blob = new Blob([htmlContent], { type: 'application/msword;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `IT_Report_${new Date().toISOString().slice(0, 10)}.doc`;
  a.click();
  URL.revokeObjectURL(url);
});

// ============================================================
userInput.focus();
</script>

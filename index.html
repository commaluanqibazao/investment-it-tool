<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投资项目IT职能助手</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #ffffff; color: #1f1f1f;
    overflow: hidden;
  }

  /* ===== DeepSeek-style initial state (full-page centered) ===== */
  .app {
    display: flex;
    height: 100vh;
    width: 100%;
    transition: all 0.5s ease;
  }

  /* Centered initial state */
  .app.initial {
    align-items: center;
    justify-content: center;
    background: #ffffff;
  }
  .app.initial .initial-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 640px;
    padding: 0 24px;
    animation: fadeInUp 0.6s ease;
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .app.initial .chat-layout { display: none; }

  /* Split state (after first valid query) */
  .app.split {
    flex-direction: row;
    align-items: stretch;
  }
  .app.split .initial-center { display: none; }

  /* ===== Logo ===== */
  .logo-icon {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, #1a8cff 0%, #0056cc 100%);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 20px;
    box-shadow: 0 4px 16px rgba(26, 140, 255, 0.25);
  }
  .logo-icon svg { width: 32px; height: 32px; stroke: #fff; }

  .app-title {
    font-size: 24px; font-weight: 600; color: #1f1f1f;
    margin-bottom: 8px;
  }
  .app-desc {
    font-size: 14px; color: #666; line-height: 1.6;
    text-align: center; max-width: 480px; margin-bottom: 32px;
  }

  /* ===== Centered Input Box (DeepSeek style) ===== */
  .center-input-wrapper {
    width: 100%; max-width: 600px;
    position: relative;
  }
  .center-input-box {
    display: flex; align-items: flex-end;
    background: #f7f7f8; border: 1px solid #e5e5e5;
    border-radius: 16px; padding: 12px 12px 12px 20px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .center-input-box:focus-within {
    border-color: #1a8cff;
    box-shadow: 0 0 0 3px rgba(26, 140, 255, 0.1);
  }
  .center-input-box textarea {
    flex: 1; border: none; background: transparent;
    resize: none; font-size: 15px; line-height: 1.5;
    font-family: inherit; color: #1f1f1f;
    outline: none; max-height: 150px; padding: 4px 0;
    min-height: 24px;
  }
  .center-input-box textarea::placeholder { color: #bbb; }
  .center-input-box button {
    width: 40px; height: 40px; border-radius: 10px;
    border: none; background: #1a8cff; color: #fff;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s; flex-shrink: 0; margin-left: 8px;
  }
  .center-input-box button:hover { background: #0a6fd6; }
  .center-input-box button:disabled { background: #ccc; cursor: not-allowed; }
  .center-input-box button svg { width: 20px; height: 20px; }

  .center-hint {
    text-align: center; font-size: 12px; color: #bbb;
    margin-top: 12px;
  }

  /* ===== Split Layout ===== */
  .chat-panel {
    width: 0; overflow: hidden;
    display: flex; flex-direction: column;
    background: #ffffff; border-right: 1px solid #e5e5e5;
    transition: width 0.5s ease, min-width 0.5s ease;
    flex-shrink: 0;
  }
  .app.split .chat-panel {
    width: 42%; min-width: 400px;
  }

  .chat-header {
    padding: 16px 20px 10px;
    border-bottom: 1px solid #f0f0f0;
    flex-shrink: 0;
  }
  .chat-header .mini-title {
    font-size: 13px; font-weight: 500; color: #888;
    display: flex; align-items: center; gap: 6px;
  }
  .chat-header .mini-title svg { width: 14px; height: 14px; stroke: #1a8cff; }

  /* Compact messages in split mode */
  .messages {
    flex: 1; overflow-y: auto; padding: 12px 16px 8px;
    display: flex; flex-direction: column; gap: 10px;
    scroll-behavior: smooth;
  }
  .msg { display: flex; gap: 8px; max-width: 100%; }
  .msg.user { flex-direction: row-reverse; }
  .msg .avatar {
    width: 26px; height: 26px; border-radius: 50%;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; margin-top: 2px;
    background: #e8f4ff; color: #1a8cff;
  }
  .msg .bubble {
    max-width: 88%; padding: 8px 12px;
    border-radius: 10px; font-size: 13.5px; line-height: 1.5;
    word-break: break-word; white-space: pre-wrap;
  }
  .msg.assistant .bubble { background: #f7f7f8; color: #1f1f1f; border-bottom-left-radius: 3px; }
  .msg.user .bubble { background: #1a8cff; color: #fff; border-bottom-right-radius: 3px; }
  .msg .bubble.rejection { background: #fff3e0; color: #e65100; }

  .msg .bubble .typing-dots { display: flex; gap: 4px; padding: 4px 0; }
  .msg .bubble .typing-dots span {
    width: 5px; height: 5px; border-radius: 50%; background: #999;
    animation: dotPulse 1.4s infinite ease-in-out;
  }
  .msg .bubble .typing-dots span:nth-child(1) { animation-delay: 0s; }
  .msg .bubble .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .msg .bubble .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotPulse { 0%,80%,100% { opacity: 0.3; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1); } }

  /* Input in split mode */
  .input-area { padding: 10px 16px 14px; border-top: 1px solid #f0f0f0; flex-shrink: 0; }
  .input-wrapper {
    display: flex; align-items: flex-end; gap: 6px;
    background: #f7f7f8; border: 1px solid #e5e5e5;
    border-radius: 10px; padding: 6px 6px 6px 14px;
    transition: border-color 0.2s;
  }
  .input-wrapper:focus-within { border-color: #1a8cff; }
  .input-wrapper textarea {
    flex: 1; border: none; background: transparent;
    resize: none; font-size: 13.5px; line-height: 1.5;
    font-family: inherit; color: #1f1f1f;
    outline: none; max-height: 100px; padding: 4px 0;
  }
  .input-wrapper textarea::placeholder { color: #bbb; }
  .input-wrapper button {
    width: 32px; height: 32px; border-radius: 8px;
    border: none; background: #1a8cff; color: #fff;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s; flex-shrink: 0;
  }
  .input-wrapper button:hover { background: #0a6fd6; }
  .input-wrapper button:disabled { background: #ccc; cursor: not-allowed; }
  .input-wrapper button svg { width: 16px; height: 16px; }

  /* ===== Document Panel ===== */
  .doc-panel {
    flex: 1; display: flex; flex-direction: column;
    background: #fafafa; width: 0;
    transition: opacity 0.4s ease;
  }
  .doc-header {
    padding: 16px 24px 12px;
    border-bottom: 1px solid #e5e5e5; flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
  }
  .doc-header .doc-title {
    font-size: 13px; font-weight: 500; color: #666;
    display: flex; align-items: center; gap: 6px;
  }
  .doc-header .doc-title svg { width: 16px; height: 16px; opacity: 0.6; }
  .doc-actions { display: flex; gap: 6px; }
  .doc-actions button {
    padding: 5px 12px; border-radius: 6px; border: 1px solid #ddd;
    background: #fff; font-size: 12px; cursor: pointer;
    display: flex; align-items: center; gap: 4px;
    transition: all 0.15s; color: #444;
  }
  .doc-actions button:hover { border-color: #1a8cff; color: #1a8cff; background: #f0f7ff; }
  .doc-actions button:disabled { opacity: 0.4; cursor: not-allowed; }

  .doc-content {
    flex: 1; overflow-y: auto; padding: 24px 32px;
  }
  .doc-content .empty-state {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%; color: #ccc; gap: 10px;
  }
  .doc-content .empty-state svg { width: 48px; height: 48px; opacity: 0.3; }
  .doc-content .empty-state p { font-size: 13px; max-width: 300px; text-align: center; line-height: 1.6; color: #bbb; }

  /* Rendered Markdown */
  .doc-render { max-width: 780px; margin: 0 auto; }
  .doc-render h1 { font-size: 20px; font-weight: 600; margin-bottom: 14px; padding-bottom: 6px; border-bottom: 2px solid #1a8cff; color: #1f1f1f; }
  .doc-render h2 { font-size: 16px; font-weight: 600; margin: 18px 0 8px; color: #2c3e50; }
  .doc-render h3 { font-size: 14px; font-weight: 600; margin: 14px 0 6px; color: #34495e; }
  .doc-render p { margin-bottom: 8px; line-height: 1.6; color: #333; font-size: 13.5px; }
  .doc-render table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 12.5px; }
  .doc-render th, .doc-render td { border: 1px solid #ddd; padding: 6px 10px; text-align: left; }
  .doc-render th { background: #f5f8ff; font-weight: 600; }
  .doc-render tr:nth-child(even) { background: #fafafa; }
  .doc-render strong { font-weight: 600; color: #1f1f1f; }
  .doc-render ul, .doc-render ol { margin: 6px 0 6px 18px; line-height: 1.6; font-size: 13.5px; }
  .doc-render code { background: #f0f0f0; padding: 2px 5px; border-radius: 3px; font-size: 12.5px; }
  .doc-render pre { background: #f5f5f5; padding: 10px 14px; border-radius: 6px; overflow-x: auto; margin: 10px 0; font-size: 12.5px; }
  .doc-render hr { border: none; border-top: 1px solid #ddd; margin: 16px 0; }
  .doc-render blockquote {
    border-left: 3px solid #1a8cff; padding: 6px 14px; margin: 10px 0;
    background: #f8fbff; color: #555; border-radius: 0 4px 4px 0; font-size: 13px;
  }

  @media (max-width: 860px) {
    .app.split { flex-direction: column; }
    .app.split .chat-panel { width: 100%; min-width: unset; max-height: 45vh; }
    .doc-panel { flex: 1; }
    .doc-content { padding: 16px; }
  }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #bbb; }
</style>
</head>
<body>

<div class="app initial" id="app">

  <!-- ===== Initial Center (DeepSeek-style homepage) ===== -->
  <div class="initial-center">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
      </svg>
    </div>
    <div class="app-title">投资项目IT职能助手</div>
    <div class="app-desc">
      本网站专注于投资项目中的 IT 职能工作支持。<br>
      输入您的 IT 尽调、技术评估、风险筛查等需求，AI 将协助生成结构化报告文档。
    </div>
    <div class="center-input-wrapper">
      <div class="center-input-box">
        <textarea id="initialInput" rows="1" placeholder="描述您的投资项目 IT 工作要求..." maxlength="2000"></textarea>
        <button id="initialSendBtn" title="发送">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <div class="center-hint">Shift+Enter 换行 · Enter 发送</div>
    </div>
  </div>

  <!-- ===== Split Layout (hidden initially) ===== -->
  <div class="chat-panel" id="chatPanel">
    <div class="chat-header">
      <div class="mini-title">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
        投资项目IT职能助手 · 对话
      </div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <div class="input-wrapper">
        <textarea id="splitInput" rows="1" placeholder="继续输入工作要求..." maxlength="2000"></textarea>
        <button id="splitSendBtn" title="发送">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <div class="doc-panel" id="docPanel">
    <div class="doc-header">
      <div class="doc-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
        文档预览
      </div>
      <div class="doc-actions">
        <button id="downloadMdBtn" disabled>📄 .md</button>
        <button id="downloadDocBtn" disabled>📝 .doc</button>
      </div>
    </div>
    <div class="doc-content" id="docContent">
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="#ddd" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <p>生成的分析文档将显示在这里</p>
      </div>
    </div>
  </div>

</div>

<script>
// ============================================================
//  Input Validation
// ============================================================
function isItInvestmentWork(text) {
  const keywords = [
    'it', '信息技术', '技术', '系统', '软件', '硬件', '网络', '安全',
    '尽调', '尽职调查', 'itdd', '风险', '筛查', '合规', '法规',
    '国别', '行业', '技术栈', '架构', '评估', '审核', '审计',
    '数据中心', '云', 'saas', 'paas', '数据保护', '隐私',
    '网络安全', '等保', 'iso', '认证', '灾备', '业务连续性',
    '供应商', 'erp', 'crm', 'plm', 'mes', 'scada', 'iot',
    'it投资', 'it项目', '信息化', '数字化', '数字化转型',
    '技术尽职调查', 'it审计', '信息安全', '渗透测试', '漏洞',
    '源代码', '知识产权', '许可证', '开源', 'license',
    '投前', '投前分析', '投前预测', '投后', '并购', '收购', '投资', '交易',
    '法规', '监管', '披露', '上市公司', '上市地',
    '风险分析', '风险筛查', '合规风险', '检查清单',
    '正大', 'cp group', 'charoen', 'pokphand',
  ];
  const lower = text.toLowerCase();
  for (const kw of keywords) { if (lower.includes(kw)) return true; }
  return false;
}

// ============================================================
//  API call
// ============================================================
const API_BASE = window.location.origin.includes('github.io')
  ? 'http://localhost:3200'
  : 'http://localhost:3200';

async function callAgent(text) {
  const resp = await fetch(`${API_BASE}/api/chat`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: text })
  });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.detail || err.error || `请求失败 (${resp.status})`);
  }
  return (await resp.json()).report;
}

// ============================================================
//  DOM refs
// ============================================================
const app           = document.getElementById('app');
const initialInput  = document.getElementById('initialInput');
const initialSend   = document.getElementById('initialSendBtn');
const messages      = document.getElementById('messages');
const splitInput    = document.getElementById('splitInput');
const splitSend     = document.getElementById('splitSendBtn');
const docContent    = document.getElementById('docContent');
const downloadMdBtn = document.getElementById('downloadMdBtn');
const downloadDocBtn = document.getElementById('downloadDocBtn');

let currentDoc = '';

// ============================================================
//  Auto-resize
// ============================================================
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 150) + 'px';
}
initialInput.addEventListener('input', () => autoResize(initialInput));
splitInput.addEventListener('input', () => autoResize(splitInput));

// ============================================================
//  Send handlers
// ============================================================
// Both inputs use the same handler
let isProcessing = false;

initialSend.addEventListener('click', () => doSend(initialInput.value));
splitSend.addEventListener('click', () => doSend(splitInput.value));

initialInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(initialInput.value); }
});
splitInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(splitInput.value); }
});

async function doSend(rawText) {
  const text = rawText.trim();
  if (!text || isProcessing) return;
  isProcessing = true;

  initialInput.value = ''; splitInput.value = '';
  autoResize(initialInput); autoResize(splitInput);

  // If still in initial state, transition to split
  if (app.classList.contains('initial')) {
    app.classList.remove('initial');
    app.classList.add('split');
    // Small delay for layout to settle
    await new Promise(r => setTimeout(r, 100));
  }

  // Add user message to chat
  addMsg(text, 'user');
  splitInput.focus();

  // Validate
  if (!isItInvestmentWork(text)) {
    addMsg('本页面仅支持投资项目 IT 职能相关工作。请描述您的 IT 尽调、技术评估、风险筛查等需求。', 'assistant', true);
    isProcessing = false;
    return;
  }

  // Show typing
  const typingId = showTyping();

  try {
    currentDoc = await callAgent(text);
    removeTyping(typingId);
    addMsg('✅ 文档已生成，请在右侧查看和下载。', 'assistant');
    renderDoc(currentDoc);
  } catch (err) {
    removeTyping(typingId);
    addMsg('⚠️ 报告生成失败：' + err.message, 'assistant', true);
  }

  isProcessing = false;
}

// ============================================================
//  Chat UI helpers
// ============================================================
function addMsg(text, role, isRejection) {
  const div = document.createElement('div'); div.className = `msg ${role}`;
  const avatar = document.createElement('div'); avatar.className = 'avatar';
  avatar.textContent = role === 'user' ? 'U' : 'AI';
  const bubble = document.createElement('div');
  bubble.className = 'bubble' + (isRejection ? ' rejection' : '');
  bubble.textContent = text;
  div.appendChild(avatar); div.appendChild(bubble);
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function showTyping() {
  const id = 'typing-' + Date.now();
  const div = document.createElement('div'); div.className = 'msg assistant'; div.id = id;
  const avatar = document.createElement('div'); avatar.className = 'avatar'; avatar.textContent = 'AI';
  const bubble = document.createElement('div'); bubble.className = 'bubble';
  bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  div.appendChild(avatar); div.appendChild(bubble);
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return id;
}
function removeTyping(id) { const el = document.getElementById(id); if (el) el.remove(); }

// ============================================================
//  Document rendering
// ============================================================
function renderDoc(md) {
  docContent.innerHTML = '<div class="doc-render">' + mdToHtml(md) + '</div>';
  downloadMdBtn.disabled = false;
  downloadDocBtn.disabled = false;
}

function mdToHtml(md) {
  let h = md.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  const lines = h.split('\n');
  const blocks = []; let i = 0;
  while (i < lines.length) {
    const l = lines[i];
    if (/^---/.test(l.trim())) { blocks.push('<hr>'); i++; continue; }
    if (l.startsWith('|')) {
      const rows = [];
      while (i < lines.length && lines[i].startsWith('|')) {
        if (lines[i].includes('---')) { i++; continue; }
        const cells = lines[i].split('|').filter(c => c.trim());
        const tag = rows.length === 0 ? 'th' : 'td';
        rows.push('<tr>' + cells.map(c => `<${tag}>${c.trim()}</${tag}>`).join('') + '</tr>'); i++;
      }
      blocks.push('<table>' + rows.join('') + '</table>'); continue;
    }
    if (/^> /.test(l)) { const b=[]; while(i<lines.length && /^> /.test(lines[i])){b.push(lines[i].replace(/^> /,''));i++} blocks.push('<blockquote>'+b.join('<br>')+'</blockquote>'); continue; }
    if (/^- /.test(l)) { const b=[]; while(i<lines.length && /^- /.test(lines[i])){b.push('<li>'+lines[i].replace(/^- /,'')+'</li>');i++} blocks.push('<ul>'+b.join('')+'</ul>'); continue; }
    if (/^\d+\. /.test(l)) { const b=[]; while(i<lines.length && /^\d+\. /.test(lines[i])){b.push('<li>'+lines[i].replace(/^\d+\. /,'')+'</li>');i++} blocks.push('<ol>'+b.join('')+'</ol>'); continue; }
    if (/^### /.test(l)) { blocks.push('<h3>'+l.replace(/^### /,'')+'</h3>'); i++; continue; }
    if (/^## /.test(l)) { blocks.push('<h2>'+l.replace(/^## /,'')+'</h2>'); i++; continue; }
    if (/^# /.test(l)) { blocks.push('<h1>'+l.replace(/^# /,'')+'</h1>'); i++; continue; }
    if (l.trim() === '') { i++; continue; }
    const p = [];
    while (i < lines.length && lines[i].trim()!=='' && !/^[#|>\-]/.test(lines[i]) && !/^- /.test(lines[i]) && !/^\d+\. /.test(lines[i]) && !/^---/.test(lines[i])) { p.push(lines[i].trim()); i++; }
    if (p.length > 0) blocks.push('<p>'+p.join(' ')+'</p>');
  }
  let r = blocks.join('\n');
  r = r.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  r = r.replace(/(?<!<[^>]*)\*(.+?)\*(?![^<]*>)/g, '<em>$1</em>');
  r = r.replace(/`([^`]+)`/g, '<code>$1</code>');
  return r;
}

downloadMdBtn.addEventListener('click', () => {
  if (!currentDoc) return;
  const blob = new Blob([currentDoc], { type: 'text/markdown;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url;
  a.download = `IT_Report_${new Date().toISOString().slice(0, 10)}.md`;
  a.click(); URL.revokeObjectURL(url);
});

downloadDocBtn.addEventListener('click', () => {
  if (!currentDoc) return;
  const body = mdToHtml(currentDoc);
  const html = `<!DOCTYPE html><html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset="utf-8"><title>IT Report</title><style>body{font-family:"Noto Sans SC","Microsoft YaHei",sans-serif;padding:36px;line-height:1.6}table{width:100%;border-collapse:collapse;margin:10px 0}th,td{border:1px solid #aaa;padding:6px 10px}th{background:#f0f4ff}</style></head><body>${body}</body></html>`;
  const blob = new Blob([html], { type: 'application/msword;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url;
  a.download = `IT_Report_${new Date().toISOString().slice(0, 10)}.doc`;
  a.click(); URL.revokeObjectURL(url);
});

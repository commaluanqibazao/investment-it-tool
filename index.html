<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投资项目IT职能助手</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #ffffff; color: #1f1f1f;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
  }
  .center {
    display: flex; flex-direction: column; align-items: center;
    width: 100%; max-width: 640px; padding: 0 24px;
    animation: fadeInUp 0.6s ease;
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .logo-icon {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, #1a8cff 0%, #0056cc 100%);
    border-radius: 14px; display: flex; align-items: center; justify-content: center;
    margin-bottom: 20px; box-shadow: 0 4px 16px rgba(26,140,255,0.25);
  }
  .logo-icon svg { width: 32px; height: 32px; stroke: #fff; }
  .app-title { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
  .app-desc {
    font-size: 14px; color: #666; line-height: 1.6;
    text-align: center; max-width: 480px; margin-bottom: 32px;
  }
  .input-wrapper { width: 100%; max-width: 600px; }
  .input-box {
    display: flex; align-items: flex-end; background: #f7f7f8;
    border: 1px solid #e5e5e5; border-radius: 16px;
    padding: 12px 12px 12px 20px; transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-box:focus-within { border-color: #1a8cff; box-shadow: 0 0 0 3px rgba(26,140,255,0.1); }
  .input-box textarea {
    flex: 1; border: none; background: transparent; resize: none;
    font-size: 15px; line-height: 1.5; font-family: inherit; color: #1f1f1f;
    outline: none; max-height: 150px; padding: 4px 0; min-height: 24px;
  }
  .input-box textarea::placeholder { color: #bbb; }
  .input-box button {
    width: 40px; height: 40px; border-radius: 10px; border: none;
    background: #1a8cff; color: #fff; cursor: pointer; display: flex;
    align-items: center; justify-content: center; transition: background 0.15s;
    flex-shrink: 0; margin-left: 8px;
  }
  .input-box button:hover { background: #0a6fd6; }
  .input-box button svg { width: 20px; height: 20px; }
  .hint { text-align: center; font-size: 12px; color: #bbb; margin-top: 12px; }
  .error-msg {
    display: none; margin-top: 16px; padding: 10px 16px;
    background: #fff3e0; border-radius: 8px; font-size: 13px;
    color: #e65100; text-align: center; max-width: 480px;
  }
</style>
</head>
<body>
<div class="center">
  <div class="logo-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
    </svg>
  </div>
  <div class="app-title">投资项目IT职能助手</div>
  <div class="app-desc">
    本网站专注于投资项目中的 IT 职能工作支持。<br>
    输入您的 IT 尽调、技术评估、风险筛查等需求，AI 将协助生成结构化报告文档。
  </div>
  <div class="input-wrapper">
    <div class="input-box">
      <textarea id="userInput" rows="1" placeholder="描述您的投资项目 IT 工作要求..." maxlength="2000"></textarea>
      <button id="sendBtn" title="发送">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="hint">Shift+Enter 换行 · Enter 发送</div>
  </div>
  <div class="error-msg" id="errorMsg"></div>
</div>

<script>
const input = document.getElementById('userInput');
const btn = document.getElementById('sendBtn');
const errorEl = document.getElementById('errorMsg');

input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 150) + 'px';
});

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); }
});
btn.addEventListener('click', submit);

function submit() {
  const text = input.value.trim();
  if (!text) return;
  errorEl.style.display = 'none';

  // 检测是否为IT投资相关工作
  const lower = text.toLowerCase();
  const reject = [/^你好$/m, /^嗨$/m, /^hello$/mi, /^hi$/mi, /你是谁/, /今天天气/, /吃饭/, /聊天/];
  for (const p of reject) { if (p.test(text)) { showError('本页面仅支持投资项目 IT 职能相关工作。'); return; } }

  // 跳转到服务器，带上输入内容
  window.location.href = 'http://1.14.77.3/it/?q=' + encodeURIComponent(text);
}

function showError(msg) {
  errorEl.textContent = msg;
  errorEl.style.display = 'block';
}

input.focus();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投资项目IT职能助手</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #ffffff; color: #1f1f1f; overflow: hidden;
  }
  .app { display: flex; height: 100vh; width: 100%; transition: all 0.5s ease; }

  /* ===== Initial state: DeepSeek-style centered ===== */
  .app.initial { align-items: center; justify-content: center; background: #ffffff; }
  .app.initial .initial-center {
    display: flex; flex-direction: column; align-items: center;
    width: 100%; max-width: 640px; padding: 0 24px;
    animation: fadeInUp 0.6s ease;
  }
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .app.initial .split-layout { display: none; }

  /* ===== Split state ===== */
  .app.split { flex-direction: row; align-items: stretch; }
  .app.split .initial-center { display: none; }
  .app.split .split-layout { display: flex; width: 100%; height: 100vh; position: relative; }

  /* ===== Logo ===== */
  .logo-icon {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, #1a8cff 0%, #0056cc 100%);
    border-radius: 14px; display: flex; align-items: center; justify-content: center;
    margin-bottom: 20px; box-shadow: 0 4px 16px rgba(26,140,255,0.25);
  }
  .logo-icon svg { width: 32px; height: 32px; stroke: #fff; }
  .app-title { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
  .app-desc { font-size: 14px; color: #666; line-height: 1.6; text-align: center; max-width: 480px; margin-bottom: 32px; }

  /* ===== Centered input (initial) ===== */
  .center-input-wrapper { width: 100%; max-width: 600px; }
  .center-input-box {
    display: flex; align-items: flex-end; background: #f7f7f8;
    border: 1px solid #e5e5e5; border-radius: 16px;
    padding: 12px 12px 12px 20px; transition: border-color 0.2s, box-shadow 0.2s;
  }
  .center-input-box:focus-within { border-color: #1a8cff; box-shadow: 0 0 0 3px rgba(26,140,255,0.1); }
  .center-input-box textarea {
    flex: 1; border: none; background: transparent; resize: none;
    font-size: 15px; line-height: 1.5; font-family: inherit; color: #1f1f1f;
    outline: none; max-height: 150px; padding: 4px 0; min-height: 24px;
  }
  .center-input-box textarea::placeholder { color: #bbb; }
  .center-input-box button {
    width: 40px; height: 40px; border-radius: 10px; border: none;
    background: #1a8cff; color: #fff; cursor: pointer; display: flex;
    align-items: center; justify-content: center; transition: background 0.15s;
    flex-shrink: 0; margin-left: 8px;
  }
  .center-input-box button:hover { background: #0a6fd6; }
  .center-input-box button:disabled { background: #ccc; cursor: not-allowed; }
  .center-input-box button svg { width: 20px; height: 20px; }
  .center-hint { text-align: center; font-size: 12px; color: #bbb; margin-top: 12px; }

  /* ===== Draggable split panels ===== */
  .chat-wrap {
    display: flex; flex-direction: column; background: #ffffff;
    border-right: 1px solid #e5e5e5; position: relative;
    min-width: 320px; max-width: 70%;
    width: 42%; flex-shrink: 0;
    transition: none; /* no transition during drag */
  }
  .doc-wrap {
    flex: 1; display: flex; flex-direction: column;
    background: #fafafa; min-width: 300px;
    width: 0; /* filled by JS */
  }

  /* Draggable divider */
  .divider {
    width: 6px; cursor: col-resize; flex-shrink: 0;
    background: transparent; position: relative;
    z-index: 10; margin: 0 -3px;
    transition: background 0.2s;
  }
  .divider:hover, .divider.active { background: #1a8cff; }
  .divider::after {
    content: ''; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 2px; height: 32px; border-radius: 1px;
    background: #ddd; transition: background 0.2s;
  }
  .divider:hover::after, .divider.active::after { background: #fff; }

  /* Chat header */
  .chat-header { padding: 14px 18px 10px; border-bottom: 1px solid #f0f0f0; flex-shrink: 0; }
  .chat-header .mini-title {
    font-size: 13px; font-weight: 500; color: #888;
    display: flex; align-items: center; gap: 6px;
  }
  .chat-header .mini-title svg { width: 14px; height: 14px; stroke: #1a8cff; }

  /* Messages */
  .messages { flex: 1; overflow-y: auto; padding: 10px 14px 6px; display: flex; flex-direction: column; gap: 8px; scroll-behavior: smooth; }
  .msg { display: flex; gap: 8px; max-width: 100%; }
  .msg.user { flex-direction: row-reverse; }
  .msg .avatar {
    width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; margin-top: 2px;
    background: #e8f4ff; color: #1a8cff;
  }
  .msg .bubble {
    max-width: 88%; padding: 8px 12px; border-radius: 10px;
    font-size: 13.5px; line-height: 1.5; word-break: break-word; white-space: pre-wrap;
  }
  .msg.assistant .bubble { background: #f7f7f8; color: #1f1f1f; border-bottom-left-radius: 3px; }
  .msg.user .bubble { background: #1a8cff; color: #fff; border-bottom-right-radius: 3px; }
  .msg .bubble.rejection { background: #fff3e0; color: #e65100; }
  .msg .bubble .typing-dots { display: flex; gap: 4px; padding: 4px 0; }
  .msg .bubble .typing-dots span {
    width: 5px; height: 5px; border-radius: 50%; background: #999;
    animation: dotPulse 1.4s infinite ease-in-out;
  }
  .msg .bubble .typing-dots span:nth-child(1) { animation-delay: 0s; }
  .msg .bubble .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .msg .bubble .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotPulse { 0%,80%,100% { opacity: 0.3; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1); } }

  /* Input in split mode */
  .input-area { padding: 8px 14px 12px; border-top: 1px solid #f0f0f0; flex-shrink: 0; }
  .input-wrapper {
    display: flex; align-items: flex-end; gap: 6px;
    background: #f7f7f8; border: 1px solid #e5e5e5;
    border-radius: 10px; padding: 6px 6px 6px 14px; transition: border-color 0.2s;
  }
  .input-wrapper:focus-within { border-color: #1a8cff; }
  .input-wrapper textarea {
    flex: 1; border: none; background: transparent; resize: none;
    font-size: 13.5px; line-height: 1.5; font-family: inherit; color: #1f1f1f;
    outline: none; max-height: 100px; padding: 4px 0;
  }
  .input-wrapper textarea::placeholder { color: #bbb; }
  .input-wrapper button {
    width: 32px; height: 32px; border-radius: 8px; border: none;
    background: #1a8cff; color: #fff; cursor: pointer; display: flex;
    align-items: center; justify-content: center; transition: background 0.15s; flex-shrink: 0;
  }
  .input-wrapper button:hover { background: #0a6fd6; }
  .input-wrapper button:disabled { background: #ccc; cursor: not-allowed; }
  .input-wrapper button svg { width: 16px; height: 16px; }

  /* ===== Document panel ===== */
  .doc-header {
    padding: 14px 22px 10px; border-bottom: 1px solid #e5e5e5;
    flex-shrink: 0; display: flex; align-items: center; justify-content: space-between;
  }
  .doc-header .doc-title { font-size: 13px; font-weight: 500; color: #666; display: flex; align-items: center; gap: 6px; }
  .doc-header .doc-title svg { width: 16px; height: 16px; opacity: 0.6; }
  .doc-actions { display: flex; gap: 6px; }
  .doc-actions button {
    padding: 5px 12px; border-radius: 6px; border: 1px solid #ddd;
    background: #fff; font-size: 12px; cursor: pointer; display: flex;
    align-items: center; gap: 4px; transition: all 0.15s; color: #444;
  }
  .doc-actions button:hover { border-color: #1a8cff; color: #1a8cff; background: #f0f7ff; }
  .doc-actions button:disabled { opacity: 0.4; cursor: not-allowed; }
  .doc-content { flex: 1; overflow-y: auto; padding: 20px 28px; }
  .doc-content .empty-state {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 100%; color: #ccc; gap: 10px;
  }
  .doc-content .empty-state svg { width: 48px; height: 48px; opacity: 0.3; }
  .doc-content .empty-state p { font-size: 13px; max-width: 300px; text-align: center; line-height: 1.6; color: #bbb; }

  /* Markdown */
  .doc-render { max-width: 780px; margin: 0 auto; }
  .doc-render h1 { font-size: 20px; font-weight: 600; margin-bottom: 14px; padding-bottom: 6px; border-bottom: 2px solid #1a8cff; }
  .doc-render h2 { font-size: 16px; font-weight: 600; margin: 18px 0 8px; }
  .doc-render h3 { font-size: 14px; font-weight: 600; margin: 14px 0 6px; }
  .doc-render p { margin-bottom: 8px; line-height: 1.6; font-size: 13.5px; }
  .doc-render table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 12.5px; }
  .doc-render th, .doc-render td { border: 1px solid #ddd; padding: 6px 10px; text-align: left; }
  .doc-render th { background: #f5f8ff; font-weight: 600; }
  .doc-render tr:nth-child(even) { background: #fafafa; }
  .doc-render ul, .doc-render ol { margin: 6px 0 6px 18px; line-height: 1.6; font-size: 13.5px; }
  .doc-render code { background: #f0f0f0; padding: 2px 5px; border-radius: 3px; font-size: 12.5px; }
  .doc-render pre { background: #f5f5f5; padding: 10px 14px; border-radius: 6px; overflow-x: auto; margin: 10px 0; }
  .doc-render hr { border: none; border-top: 1px solid #ddd; margin: 16px 0; }
  .doc-render blockquote { border-left: 3px solid #1a8cff; padding: 6px 14px; margin: 10px 0; background: #f8fbff; border-radius: 0 4px 4px 0; font-size: 13px; }

  @media (max-width: 860px) {
    .app.split .split-layout { flex-direction: column; }
    .chat-wrap { width: 100% !important; max-width: 100%; min-width: unset; max-height: 40vh; border-right: none; border-bottom: 1px solid #e5e5e5; }
    .divider { display: none; }
    .doc-content { padding: 14px; }
  }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #bbb; }

  .gh-banner {
    display: none; background: #fff3e0; border-bottom: 1px solid #ffcc80;
    padding: 10px 20px; text-align: center; font-size: 14px;
    color: #e65100; flex-shrink: 0;
  }
  .gh-banner a { color: #1a8cff; font-weight: 600; }
</style>
</head>
<body>
<div class="gh-banner" id="ghBanner">
  ⚠️ GitHub Pages 预览页 — 请使用
  <a href="http://1.14.77.3/it/">http://1.14.77.3/it/</a> 访问完整功能
</div>

<div class="app initial" id="app">

  <!-- ===== Initial Center ===== -->
  <div class="initial-center">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
      </svg>
    </div>
    <div class="app-title">投资项目IT职能助手</div>
    <div class="app-desc">
      本网站专注于投资项目中的 IT 职能工作支持。<br>
      输入您的 IT 尽调、技术评估、风险筛查等需求，AI 将协助生成结构化报告文档。
    </div>
    <div class="center-input-wrapper">
      <div class="center-input-box">
        <textarea id="initialInput" rows="1" placeholder="描述您的投资项目 IT 工作要求..." maxlength="2000"></textarea>
        <button id="initialSendBtn" title="发送"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
      </div>
      <div class="center-hint">Shift+Enter 换行 · Enter 发送</div>
    </div>
  </div>

  <!-- ===== Split Layout ===== -->
  <div class="split-layout">
    <div class="chat-wrap" id="chatWrap">
      <div class="chat-header">
        <div class="mini-title">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
          投资项目IT职能助手 · 对话
        </div>
      </div>
      <div class="messages" id="messages"></div>
      <div class="input-area">
        <div class="input-wrapper">
          <textarea id="splitInput" rows="1" placeholder="继续输入工作要求..." maxlength="2000"></textarea>
          <button id="splitSendBtn" title="发送"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
        </div>
      </div>
    </div>

    <!-- Draggable Divider -->
    <div class="divider" id="divider"></div>

    <div class="doc-wrap" id="docWrap">
      <div class="doc-header">
        <div class="doc-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          文档预览
        </div>
        <div class="doc-actions">
          <button id="downloadMdBtn" disabled>📄 .md</button>
          <button id="downloadDocBtn" disabled>📝 .doc</button>
        </div>
      </div>
      <div class="doc-content" id="docContent">
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="#ddd" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          <p>生成的分析文档将显示在这里</p>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
// ============================================================
//  API endpoint — GitHub Pages 调用公网服务器
// ============================================================
// 检测运行环境
const ON_GHPAGES = window.location.hostname.includes('github.io');
const API_SERVER = ON_GHPAGES
  ? 'https://1.14.77.3.nip.io'  // GitHub Pages → 服务器HTTPS
  : '';                          // 服务器同源 → 相对路径

if (ON_GHPAGES) {
  document.getElementById('ghBanner').style.display = 'block';
  document.querySelector('.gh-banner').innerHTML =
    '⚠️ 当前为 GitHub Pages 预览页 — ' +
    '<a href="https://1.14.77.3.nip.io/">点击跳转</a> 或等待5秒自动跳转';
  setTimeout(() => { window.location.href = 'https://1.14.77.3.nip.io/'; }, 5000);
}

// ============================================================
//  Input Validation
// ============================================================
function isItInvestmentWork(text) {
  const keywords = [
    'it','信息技术','技术','系统','软件','硬件','网络','安全',
    '尽调','尽职调查','itdd','风险','筛查','合规','法规',
    '国别','行业','技术栈','架构','评估','审核','审计',
    '数据中心','云','saas','paas','数据保护','隐私',
    '网络安全','等保','iso','认证','灾备','业务连续性',
    '供应商','erp','crm','plm','mes','scada','iot',
    'it投资','it项目','信息化','数字化','数字化转型',
    '技术尽职调查','it审计','信息安全','渗透测试','漏洞',
    '源代码','知识产权','许可证','开源','license',
    '投前','投前分析','投前预测','投后','并购','收购','投资','交易',
    '法规','监管','披露','上市公司','上市地',
    '风险分析','风险筛查','合规风险','检查清单',
    '正大','cp group','charoen','pokphand',
  ];
  const lower = text.toLowerCase();
  for (const kw of keywords) { if (lower.includes(kw)) return true; }
  return false;
}

async function callAgent(text) {
  const resp = await fetch(`${API_SERVER}/api/chat`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: text })
  });
  if (!resp.ok) {
    const err = await resp.json().catch(()=>({}));
    throw new Error(err.detail || err.error || `请求失败 (${resp.status})`);
  }
  return (await resp.json()).report;
}

// ============================================================
//  DOM refs
// ============================================================
const app          = document.getElementById('app');
const initialInput = document.getElementById('initialInput');
const initialSend  = document.getElementById('initialSendBtn');
const messages     = document.getElementById('messages');
const splitInput   = document.getElementById('splitInput');
const splitSend    = document.getElementById('splitSendBtn');
const docContent   = document.getElementById('docContent');
const downloadMdBtn = document.getElementById('downloadMdBtn');
const downloadDocBtn = document.getElementById('downloadDocBtn');
const chatWrap     = document.getElementById('chatWrap');
const docWrap      = document.getElementById('docWrap');
const divider      = document.getElementById('divider');

let currentDoc = '';
let isProcessing = false;

// ============================================================
//  Draggable Divider
// ============================================================
let isDragging = false;

divider.addEventListener('mousedown', (e) => {
  isDragging = true;
  divider.classList.add('active');
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
});

document.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const rect = app.getBoundingClientRect();
  let pct = ((e.clientX - rect.left) / rect.width) * 100;
  pct = Math.max(30, Math.min(65, pct)); // clamp 30%-65%
  chatWrap.style.width = pct + '%';
});

document.addEventListener('mouseup', () => {
  if (isDragging) {
    isDragging = false;
    divider.classList.remove('active');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  }
});

// ============================================================
//  Auto-resize inputs
// ============================================================
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,150)+'px'; }
initialInput.addEventListener('input', () => autoResize(initialInput));
splitInput.addEventListener('input', () => autoResize(splitInput));

// ============================================================
//  Send
// ============================================================
initialSend.addEventListener('click', () => doSend(initialInput.value));
splitSend.addEventListener('click', () => doSend(splitInput.value));
initialInput.addEventListener('keydown', (e) => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend(initialInput.value);} });
splitInput.addEventListener('keydown', (e) => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend(splitInput.value);} });

async function doSend(rawText) {
  const text = rawText.trim();
  if (!text || isProcessing) return;
  isProcessing = true;

  initialInput.value = ''; splitInput.value = '';
  autoResize(initialInput); autoResize(splitInput);

  if (app.classList.contains('initial')) {
    app.classList.remove('initial');
    app.classList.add('split');
    await new Promise(r => setTimeout(r, 100));
  }

  addMsg(text, 'user');
  splitInput.focus();

  if (!isItInvestmentWork(text)) {
    addMsg('本页面仅支持投资项目 IT 职能相关工作。请描述您的 IT 尽调、技术评估、风险筛查等需求。','assistant',true);
    isProcessing = false; return;
  }

  const typingId = showTyping();
  try {
    currentDoc = await callAgent(text);
    removeTyping(typingId);
    addMsg('✅ 文档已生成，请在右侧查看和下载。','assistant');
    renderDoc(currentDoc);
  } catch (err) {
    removeTyping(typingId);
    addMsg('⚠️ 报告生成失败：' + err.message,'assistant',true);
  }
  isProcessing = false;
}

// ============================================================
//  Chat UI
// ============================================================
function addMsg(text, role, isRejection) {
  const div = document.createElement('div'); div.className = `msg ${role}`;
  const a = document.createElement('div'); a.className = 'avatar'; a.textContent = role==='user'?'U':'AI';
  const b = document.createElement('div');
  b.className = 'bubble' + (isRejection ? ' rejection' : '');
  b.textContent = text; div.appendChild(a); div.appendChild(b);
  messages.appendChild(div); messages.scrollTop = messages.scrollHeight;
}

function showTyping() {
  const id = 'typing-'+Date.now();
  const d = document.createElement('div'); d.className='msg assistant'; d.id=id;
  const a = document.createElement('div'); a.className='avatar'; a.textContent='AI';
  const b = document.createElement('div'); b.className='bubble';
  b.innerHTML='<div class="typing-dots"><span></span><span></span><span></span></div>';
  d.appendChild(a); d.appendChild(b); messages.appendChild(d);
  messages.scrollTop = messages.scrollHeight; return id;
}
function removeTyping(id) { const e=document.getElementById(id); if(e)e.remove(); }

// ============================================================
//  Document
// ============================================================
function renderDoc(md) {
  docContent.innerHTML = '<div class="doc-render">'+mdToHtml(md)+'</div>';
  downloadMdBtn.disabled = false; downloadDocBtn.disabled = false;
}

function mdToHtml(md) {
  let h = md.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const L = h.split('\n'); const B = []; let i=0;
  while(i<L.length){const l=L[i];
    if(/^---/.test(l.trim())){B.push('<hr>');i++;continue}
    if(l.startsWith('|')){const R=[];while(i<L.length&&L[i].startsWith('|')){if(L[i].includes('---')){i++;continue}const c=L[i].split('|').filter(c=>c.trim());const t=R.length===0?'th':'td';R.push('<tr>'+c.map(x=>`<${t}>${x.trim()}</${t}>`).join('')+'</tr>');i++}B.push('<table>'+R.join('')+'</table>');continue}
    if(/^> /.test(l)){const q=[];while(i<L.length&&/^> /.test(L[i])){q.push(L[i].replace(/^> /,''));i++}B.push('<blockquote>'+q.join('<br>')+'</blockquote>');continue}
    if(/^- /.test(l)){const q=[];while(i<L.length&&/^- /.test(L[i])){q.push('<li>'+L[i].replace(/^- /,'')+'</li>');i++}B.push('<ul>'+q.join('')+'</ul>');continue}
    if(/^\d+\. /.test(l)){const q=[];while(i<L.length&&/^\d+\. /.test(L[i])){q.push('<li>'+L[i].replace(/^\d+\. /,'')+'</li>');i++}B.push('<ol>'+q.join('')+'</ol>');continue}
    if(/^### /.test(l)){B.push('<h3>'+l.replace(/^### /,'')+'</h3>');i++;continue}
    if(/^## /.test(l)){B.push('<h2>'+l.replace(/^## /,'')+'</h2>');i++;continue}
    if(/^# /.test(l)){B.push('<h1>'+l.replace(/^# /,'')+'</h1>');i++;continue}
    if(l.trim()===''){i++;continue}
    const p=[];while(i<L.length&&L[i].trim()!==''&&!/^[#|>\-]/.test(L[i])&&!/^- /.test(L[i])&&!/^\d+\. /.test(L[i])&&!/^---/.test(L[i])){p.push(L[i].trim());i++}
    if(p.length>0)B.push('<p>'+p.join(' ')+'</p>');
  }
  let r=B.join('\n');
  r=r.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  r=r.replace(/(?<!<[^>]*)\*(.+?)\*(?![^<]*>)/g,'<em>$1</em>');
  r=r.replace(/`([^`]+)`/g,'<code>$1</code>');
  return r;
}
